<!DOCTYPE HTML>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Component CSS -->
    <style>
      /* extra (component/0-ds-styling) */
      @import url('https://fonts.googleapis.com/css?family=Alegreya+Sans:400,400i,700,700i');
      /* style (component/0-ds-styling) */
      /* ds-alert-root */
      :root {
        --ds-alert-text-color: var(--ds-black);
        --ds-alert-error-color: var(--ds-error-color);
        --ds-alert-warning-color: var(--ds-warning-color);
        --ds-alert-info-color: var(--ds-info-color);
      }
      /* ds-alert */
      .ds-alert {
        padding: 0.05px; /* contain child margins */
        color: var(--ds-alert-text-color);
      }
      @supports (display: flow-root) {
        .ds-alert {
          display: flow-root;
          padding: 0;
        }
      }
      .ds-alert-error {
        background-color: var(--ds-alert-error-color);
      }
      .ds-alert-warning {
        background-color: var(--ds-alert-warning-color);
      }
      .ds-alert-info {
        background-color: var(--ds-alert-info-color);
      }
      /* ds-align */
      .ds-align-center {
        text-align: center;
        margin-left: auto;
        margin-right: auto;
      }
      .ds-align-center-middle {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ds-align-right {
        float: right;
      }
      .ds-align-left {
        float: left;
      }
      /* ds-background-root */
      :root {
        --ds-background-dark-text-color: white;
        --ds-background-dark-shadow-color: var(--ds-black);
        --ds-background-dark-shadox-size: 2px;
        --ds-background-dark-shadow-offset: 0 0;
      
        --ds-background-light-text-color: var(--ds-color);
        --ds-background-light-shadow-color: white;
        --ds-background-light-shadox-size: 3px;
        --ds-background-light-shadow-offset: 0 0;
      }
      
      :root {
        --ds-background-dark-text-shadow: var(--ds-background-dark-shadow-offset) var(--ds-background-dark-shadow-size) var(--ds-background-dark-shadow-color);
        --ds-background-light-text-shadow: var(--ds-background-light-shadow-offset) var(--ds-background-light-shadow-size) var(--ds-background-light-shadow-color);
      }
      
      /* ds-background */
      .ds-background-dark {
        color: var(--ds-background-dark-text-color);
        text-shadow: var(--ds-background-dark-text-shadow);
      }
      .ds-background-light {
        color: var(--ds-background-light-text-color);
        text-shadow: var(--ds-background-light-text-shadow);
      }
      /* ds-background-image */
      .ds-background-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }
      /* ds-box-root */
      :root {
        --ds-box-radius: 3px;
        --ds-box-shadow: var(--ds-shadow-small);
      }
      /* ds-box */
      .ds-box {
        border-radius: var(--ds-box-radius);
        box-shadow: var(--ds-box-shadow);
        position: relative;
        break-inside: avoid;
      }
      @supports (display: flow-root) {
        .ds-box {
          display: flow-root;
          padding: 0;
        }
      }
      .ds-box-top {
        border-top-left-radius: var(--ds-box-radius);
        border-top-right-radius: var(--ds-box-radius);
      }
      .ds-box-bottom {
        border-bottom-left-radius: var(--ds-box-radius);
        border-bottom-right-radius: var(--ds-box-radius);
      }
      
      /* ds-button-root */
      :root {
        --ds-button-spacing: calc(0.5 * var(--ds-input-spacing));
        --ds-button-bg-color: var(--ds-grey-light);
        --ds-button-default-bg-color: var(--ds-white);
        --ds-button-border-color: var(--ds-grey-light);
        --ds-button-disabled-color: var(--ds-grey-medium);
        --ds-button-disabled-bg-color: var(--ds-white);
        --ds-button-primary-bg-color: var(--ds-primary);
        --ds-button-primary-color: var(--ds-primary-contrast);
        --ds-button-primary-border-color: var(--ds-primary);
        --ds-button-line-height: calc(var(--ds-line-height) * 1.5);
        --ds-button-shadow: var(--ds-shadow-tiny);
        --ds-button-shadow-hover: var(--ds-shadow-small);
        --ds-button-radius: 3px;
      }
      /* ds-button */
      :root .ds-button {
        line-height: var(--ds-button-line-height);
        min-height: var(--ds-button-line-height);
      }
      .ds-button {
        margin: 0 var(--ds-button-spacing) var(--ds-button-spacing) 0;
        overflow: visible;
        font: inherit;
        color: inherit;
        display: inline-block;
        box-sizing: border-box;
        padding: 0 calc(0.5 * var(--ds-line-height));
        vertical-align: middle;
        font-size: calc(0.875 * var(--ds-font-size));
        text-align: center;
        text-decoration: none;
        text-transform: uppercase;
        background-color: var(--ds-button-bg-color);
        outline: 1px solid var(--ds-button-border-color);
        border: 0;
        white-space: nowrap;
        box-shadow: var(--ds-button-shadow);
        border-radius: var(--ds-button-radius);
      }
      .ds-button::-moz-focus-inner {
        border: 0;
      }
      .ds-button:hover,
      .ds-button:focus {
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        box-shadow: var(--ds-button-shadow-hover);
      }
      a.ds-button,
      a.ds-button:hover,
      a.ds-button:active,
      a.ds-button:visited {
        color: inherit;
      }
      .ds-button-default {
        background-color: var(--ds-button-default-bg-color);
      }
      a.ds-button-primary, a.ds-button-primary:hover,
      a.ds-button-primary:active, a.ds-button-primary:visited,
      .ds-button-primary, .ds-button-primary:hover {
        background-color: var(--ds-button-primary-bg-color);
        color: var(--ds-button-primary-color);
        border-color: var(--ds-button-primary-border-color);
      }
      a.ds-button-support, a.ds-button-support:hover,
      a.ds-button-support:active, a.ds-button-support:visited,
      .ds-button-support, .ds-button-support:hover {
        background-color: var(--ds-button-support-bg-color);
        color: var(--ds-button-support-color);
        border-color: var(--ds-button-support-border-color);
      }
      .ds-button:disabled {
        background-color: var(--ds-button-disabled-bg-color);
        color: var(--ds-button-disabled-color);
      }
      .ds-button:disabled:hover {
        cursor: not-allowed;
        box-shadow: 0 0 0;
      }
      .ds-button-group {
        display: flex;
        flex-wrap: wrap;
      }
      .ds-button-light {
        background: none;
        outline: 0;
        padding: 0;
      }
      .ds-button-naked {
        background: none;
        outline: 0;
      }
      .ds-button-close {
        position: absolute;
        right: var(--ds-spacing);
        margin: 0;
      }
      
      .ds-button-grow {
        display: block;
        width: 100%;
      }
      /* ds-bg */
      .ds-bg-primary {
        background: var(--ds-primary);
        color: var(--ds-primary-contrast);
        --ds-contrast: var(--ds-primary-contrast);
      }
      .ds-bg-primary-gradient {
        background: var(--ds-primary-gradient);
        color: var(--ds-primary-contrast);
        --ds-contrast: var(--ds-primary-contrast);
      }
      .ds-bg-support {
        background: var(--ds-support);
        color: var(--ds-support-contrast);
        --ds-contrast: var(--ds-support-contrast);
      }
      .ds-bg-support-gradient {
        background: var(--ds-support-gradient);
        color: var(--ds-support-contrast);
        --ds-contrast: var(--ds-support-contrast);
      }
      .ds-bg-grey-dark {
        background: var(--ds-grey-dark);
        color: var(--ds-white);
        --ds-contrast: var(--ds-white);
      }
      .ds-bg-grey-medium {
        background: var(--ds-grey-medium);
        color: var(--ds-white);
        --ds-contrast: var(--ds-white);
      }
      .ds-bg-grey-light {
        background: var(--ds-grey-light);
        color: var(--ds-black);
        --ds-contrast: var(--ds-black);
      }
      /* ds-color */
      .ds-color {
        display: flex;
        text-align: center;
        font-size: 0.8em;
        align-items: center;
        justify-content: center;
      }
      .ds-color-primary {
        color: var(--ds-primary);
      }
      .ds-color-support {
        color: var(--ds-support);
      }
      /* ds-contain */
      .ds-contain {
        padding: 0.05px; /* IE fallback */
      }
      @supports (display: flow-root) {
        .ds-contain {
          padding: 0;
          display: flow-root;
        }
      }
      /* ds-core-colors */
      :root {
        --ds-black: #000;
        --ds-white: #FFF;
      
        --ds-primary: #ae47ff;
        --ds-primary-light: #c880ff;
        --ds-primary-dark: #8d00f8;
        --ds-primary-bump: #b65cfc;
        --ds-primary-contrast: var(--ds-white);
        --ds-primary-gradient: linear-gradient( 180deg, var(--ds-primary), var(--ds-primary-dark) );
        --ds-primary-gradient-bump: linear-gradient( 180deg, var(--ds-primary-bump), var(--ds-primary-light) 95%, var(--ds-primary-dark) 100%);
      
        --ds-support: #06CC06;
        --ds-support-dark: #05BB05;
        --ds-support-light: #07DE07;
        --ds-support-contrast: #FFF;
        --ds-support-gradient: linear-gradient( to left, var(--ds-support-light), var(--ds-support-dark) );
        /* http://www.colorbox.io/#steps=11#hue_start=198#hue_end=198#hue_curve=linear#sat_start=15#sat_end=15#sat_curve=linear#sat_rate=130#lum_start=98#lum_end=0#lum_curve=easeOutQuad#lock_hex=eef1f8#minor_steps_map=0 */
        --ds-grey-0: #eef1f8;
        --ds-grey-5: #e9edf6;
        --ds-grey-10: #e4eaf4;
        --ds-grey-20: #dae2ed;
        --ds-grey-30: #cdd7e3;
        --ds-grey-40: #bdc8d4;
        --ds-grey-50: #a8b4c0;
        --ds-grey-60: #8f9ba6;
        --ds-grey-70: #707c84;
        --ds-grey-80: #4d565c;
        --ds-grey-90: #262c2f;
        --ds-grey-100: #000000;
        --ds-grey-dark: var(--ds-grey-90);
        --ds-grey-medium: var(--ds-grey-60);
        --ds-grey-light: var(--ds-grey-0);
      
        --ds-error-color: rgb(253, 143, 143);
        --ds-warning-color: #FFFFCC;
        --ds-info-color: rgb(140, 180, 250);
      }
      /* ds-core-reset */
      body,div,dl,dt,dd,ul,ol,li,h1,h2,h3,h4,h5,h6,pre,form,fieldset,p,blockquote,th,td {
        margin:0; 
        padding:0; 
      }
      img {
        max-width: 100%;
        display: block;
      }
      * {
        box-sizing: border-box;
      }
      /* ds-core-shadows */
      :root {
        --ds-shadow-light: rgba(0,0,0,0.07);
        --ds-shadow-middle: rgba(0,0,0,0.09);
        --ds-shadow-dark: rgba(0,0,0,0.11);
        --ds-shadow-tiny: 
          0 1px 1px var(--ds-shadow-dark)
          ;
        --ds-shadow-small: 
          0 1px 1px var(--ds-shadow-dark),
          0 2px 2px var(--ds-shadow-middle),
          0 4px 4px var(--ds-shadow-light)
          ;
        --ds-shadow-medium: 
          0 1px 1px var(--ds-shadow-middle),
          0 2px 2px var(--ds-shadow-middle),
          0 4px 4px var(--ds-shadow-middle),
          0 6px 8px var(--ds-shadow-middle),
          0 8px 16px var(--ds-shadow-middle)
          ;
        --ds-shadow-large: 
          0 2px 1px var(--ds-shadow-light),
          0 4px 2px var(--ds-shadow-light),
          0 8px 4px var(--ds-shadow-light),
          0 16px 8px var(--ds-shadow-light),
          0 32px 16px var(--ds-shadow-light) 
          ;
      }
      /* ds-core-typography */
      @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;1,300&family=Roboto+Condensed:ital@0;1&display=swap');
      :root {
        --ds-body-font: 'Lato', sans-serif;
        --ds-heading-font: 'Roboto Condensed', Helvetica, sans-serif;
      }
      :root {
        --ds-font-size: 1rem;
        --ds-font-weight: 300;
        --ds-line-height: calc(1.6 * var(--ds-font-size));
        --ds-color: var(--ds-black);
        --ds-color-transparent: rgba(0,0,0,0);
        --ds-contrast: var(--ds-grey-dark);
        --ds-background: var(--ds-white);
        --ds-background-transparent: rgba(255,255,255,0);
        --ds-heading-weight: 400;
        --ds-heading-multiplier: 1.27201965;
        --ds-spacing: var(--ds-line-height);
      }
      /* ds-hidden */
      .ds-hidden {
        max-height: 0;
        overflow: hidden;
      }
      /* ds-icon */
      .ds-icon {
        display: inline-block;
        height: var(--ds-line-height);
        width: 1em;
        vertical-align: bottom;
      }
      
      .ds-icon-feather {
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: square;
        stroke-linejoin: square;
        fill: none;
      }
      /* ds-screen-size */
      :root {
        --ds-screen-size: tiny;
      }
      @media (min-width: 480px)  {
        :root {
          --ds-screen-size: small;
        }
      }
      @media (min-width: 640px) {
        :root {
          --ds-screen-size: tablet;
        }
      }
      @media (min-width: 992px) {
        :root {
          --ds-screen-size: medium;
        }
      }
      @media (min-width: 1200px) {
        :root {
          --ds-screen-size: large;
        }
      }
      @media (min-width: 1800px) {
        :root {
          --ds-screen-size: extra-large;
        }
      }
      /* ds-shadow */
      .ds-shadow-tiny {
        box-shadow: var(--ds-shadow-tiny);
      }
      .ds-shadow-small {
        box-shadow: var(--ds-shadow-small);
      }
      .ds-shadow-medium {
        box-shadow: var(--ds-shadow-medium);
      }
      .ds-shadow-large {
        box-shadow: var(--ds-shadow-large);
      }
      /* ds-space */
      .ds-space-margin-up {
        margin-top: calc(-1 * var(--ds-spacing));
      }
      .ds-space-none {
        margin: 0;
      }
      .ds-space {
        margin: var(--ds-line-height);
      }
      .ds-space-vertical {
        margin: var(--ds-line-height) 0;
      }
      .ds-space-horizontal {
        margin-left: var(--ds-spacing);
        margin-right: var(--ds-spacing);
      }
      .ds-space-left {
        margin-left: var(--ds-spacing);
      }
      .ds-space-right {
        margin-right: var(--ds-spacing);
      }
      .ds-space-top {
        margin-top: var(--ds-spacing);
      }
      .ds-space-bottom {
        margin-bottom: var(--ds-spacing);
      }
      
      .ds-space-inside {
        padding: 0 var(--ds-spacing);
      }
      .ds-space-inside::before,
      .ds-space-inside::after {
        content: "";
        display: block;
        height: 0;
      }
      .ds-space-inside::before {
        margin-bottom: var(--ds-spacing);
      }
      .ds-space-inside::after {
        margin-top: var(--ds-spacing);
      }
      
      /* extra (component/1-styling) */
      @import url('https://fonts.googleapis.com/css?family=Alegreya+Sans:400,400i,700,700i');
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
      }
      [data-simply-command] {
        cursor: pointer; /* Dear iOS, why don't you have a click event when the cursor is not a pointer? */
      }
      textarea {
        width: 100%;
        height: 120px;
        color: #e0e0e0;
        background-color: #151515;
        border: 0;
        padding: 10px;
      }
      input:not([type]),
      input[type=text],
      input[type=password] {
        color: #e0e0e0;
        background-color: #151515;
        border: 0;
        padding: 15px 10px;
        font-size: 1.6em;
      }
      
      div.main,
      main {
        min-height: 100%;
      }
      .simply-toolbar.simply-toolbar-main {
        z-index: 10;
      }
      /* main-grid (component/1-styling) */
      main {
        display: grid;
        grid-template-areas:
          "header header"
          "left right"
          ;
        grid-template-columns: 320px auto;
        grid-template-rows: 65px auto;
        min-height: 100vh;
      }
      @media (max-width: 480px) {
        main {
          display: grid;
          grid-template-areas:
            "header"
            "content"
            ;
        	grid-template-columns: auto;
          grid-template-rows: 65px auto;
          min-height: 100vh;
        }
      }
      main > .simply-toolbar {
        grid-area: header;
      }
      
      /* simply-toast (component/1-styling) */
      :root {
        --simply-toast-height: 60px;
        --simply-toast-hide-delay: 3s;
        --simply-toast-show-duration: 0.3s;
        --simply-toast-hide-duration: 0.5s;
        --simply-toast-margin: 20px;
        --simply-toast-error-color: rgb(253, 143, 143);
        --simply-toast-warning-color: #FFFFCC;
        --simply-toast-info-color: rgb(140, 180, 250);
        --simply-toast-white: #FFF;
        --simply-toast-grey-50: #a8b4c0;
        --simply-toast-grey-80: #4d565c;
        --simply-toast-font-size: calc(1.1 * 1rem);
        --simply-toast-font-weight: 300;
        --simply-toast-line-height: calc(1.5 * var(--simply-toast-font-size));
        --simply-toast-color: var(--simplycode-grey-medium);
        --simply-toast-contrast: var(--simplycode-grey-medium);
        --simply-toast-background:var(--simplycode-white);
        --simply-toast-heading-weight: 900;
        --simply-toast-heading-multiplier: 1.1;
      }
      
      ul.simply-toasts,
      ol.simply-toasts,
      .simply-toasts {
        position: fixed;
        right: 0;
        top: 0;
        z-index: 101;
        display: block;
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: 50%;
        min-width: 300px;
      }
      .simply-toast,
      li.simply-toast {
        min-width: 300px;
        float: right;
        clear: both;
        margin-right: 0;
        margin-top: 60px;
        background-color: var(--simply-toast-grey-80);
        color: var(--simply-toast-white);
        display: block;
        border-left: 10px solid var(--simply-toast-grey-50);
        padding: 20px;
        border-radius: 2px;
      }
      .simply-toast-error,
      li.simply-toast-error {
        border-color: var(--simply-toast-error-color);
      }
      .simply-toast-info,
      li.simply-toast-info {
        border-color: var(--simply-toast-info-color);
      }
      .simply-toast-warning,
      li.simply-toast-warning {
        border-color: var(--simply-toast-warning-color);
      }
      
      @keyframes simply-toast-show {
        0% {
          transform: scaleX(0);
          transform-origin: right;
          opacity: 0;
        }
        50% {
          transform: scaleX(0);
          transform-origin: right;
          opacity: 0;
        }
        75% {
          opacity: 1;
        }
        100% {
          transform: scaleX(1);
          transform-origin: right;
          opacity: 1;
        }
      }
      @keyframes simply-toast-hide {
        0% {
          transform: scaleX(1);
          transform-origin: right;
          opacity: 1;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: scaleX(0);
          transform-origin: right;
          opacity: 0;
        }
      }
      @keyframes simply-toast-move {
        0% {
          transform: translateY(-80px); /* toast-height + toast-margin */
        }
        100% {
          transform: translateY(0px);
        }
      }
      .simply-toast[data-state="new"] {
        animation: simply-toast-show var(--simply-toast-show-duration) forwards;
      }
      .simply-toast-autohide[data-state="new"] {
        animation: simply-toast-show var(--simply-toast-show-duration);
        animation-delay: 0s;
      }
      .simply-toast-autohide.simply-toast-animated[data-state="shown"] {
        animation: simply-toast-hide var(--simply-toast-hide-duration) forwards;
        animation-delay: calc(var(--simply-toast-hide-delay) - var(--simply-toast-show-duration));
      }
      .simply-toast-autohide:not(.simply-toast-animated)[data-state="shown"] {
        animation: simply-toast-move var(--simply-toast-show-duration), simply-toast-hide var(--simply-toast-hide-duration) forwards;
        animation-delay: 0s, var(--simply-toast-hide-delay);
      }
      
      /* simplycode-ds-mapping (component/1-styling) */
      /* simplycode-ds-core-colors */
      :root {
        --ds-primary: var(--simplycode-highlight-light);
        --ds-primary-dark: var(--simplycode-highlight-dark);
        --ds-primary-contrast: var(--simplycode-highlight-color);
        --ds-primary-light: var(--simplycode-highlight-light);
        --ds-primary-gradient: var(--simplycode-highlight-gradient);
        --ds-primary-bump: #b65cfc;
        --ds-primary-gradient-bump: linear-gradient( 180deg, var(--ds-primary-bump), var(--simplycode-highlight-light) 95%, var(--simplycode-highlight-dark) 100%);
      
        --ds-support: #06CC06;
        --ds-support-dark: #05BB05;
        --ds-support-light: #07DE07;
        --ds-support-contrast: #FFF;
        --ds-support-gradient: linear-gradient( to left, var(--ds-support-light), var(--ds-support-dark) );
      
        --ds-heading-font: var(--simplycode-font-family);
      }
      
      /* style (component/1-styling) */
      :root {
        --simplycode-highlight-dark: #f16623;
        --simplycode-highlight-light: #ff8003;
        --simplycode-highlight-color: #fff;
        --simplycode-highlight-background: linear-gradient( to left, var(--simplycode-highlight-light), var(--simplycode-highlight-dark) );
      
        --simplycode-support-dark: #444;
        --simplycode-support-light: #484848;

      /* buttons (component/form-elements) */
      .solid-button {
        padding: var(--solid-button-padding);
        border-radius: var(--solid-button-border-radius);

      .solid-button-secondary {

      .solid-dark .solid-button-primary {

      .solid-dark .solid-button-secondary {

        color: var(--solid-dark-button-secondary-text-color);

      /* checkbox (component/form-elements) */
      .solid-form *:before,
      .solid-form *:after {
        box-sizing: border-box;
      }
      .solid-form label:has(input[type="checkbox"]) {
        display: flex;
        gap: calc(var(--solid-main-form-buttons-gap) / 2);
      }
      .solid-form input[type="checkbox"] {
        /* Add if not using autoprefixer */
        -webkit-appearance: none;
        /* Remove most all native input styles */
        appearance: none;
        /* For iOS < 15 */
        background-color: none;
        /* Not removed via appearance */
        margin: 0;
      
        font: inherit;
        color: var(--simplycode-highlight-dark);
        width: var(--solid-checkbox-size);
        height: var(--solid-checkbox-size);
        border: var(--solid-checkbox-border-size) solid var(--solid-checkbox-border-color);
        border-radius: var(--solid-checkbox-size);
        display: grid;
        place-content: center;
        margin-right: 10px;
      }
      
      .solid-form input[type="checkbox"]::before {
        width: var(--solid-checkbox-size);
        height: var(--solid-checkbox-size);
        border-radius: var(--solid-checkbox-size);
        background: var(--solid-checkbox-border-color);
      }
      .solid-form input[type="checkbox"]:checked::before {
        content: "";
      }
      
      .solid-form input[type="checkbox"]:focus {
        outline: max(2px, 0.15em) solid currentColor;
        outline-offset: max(2px, 0.15em);
      }
      
      .solid-form input[type="checkbox"]:disabled {
        --solid-checkbox-border-color: var(--solid-form-control-disabled-color);
        color: var(--solid-form-control-disabled-color);
        cursor: not-allowed;
      }
      /* form (component/form-elements) */
      .solid-form {
        display: flex;
        flex-direction: column;
        gap: var(--solid-form-gap);
        max-width: var(--solid-form-width);

        --solid-input-width: 100%;

      .solid-form p {

      .solid-form:invalid {
        --solid-light-button-primary-background: var(--solid-pink-inactive);
        --solid-dark-button-primary-background: var(--solid-pink-inactive);
        --solid-light-button-primary-border: var(--solid-button-border-size) solid var(--solid-pink-inactive);
        --solid-dark-button-primary-border: var(--solid-button-border-size) solid var(--solid-pink-inactive);
      }
      /* hint (component/form-elements) */
      .solid-hint  {
        box-sizing: border-box;
        border-radius: var(--solid-hint-border-radius);
        border: var(--solid-hint-border);
        padding: var(--solid-hint-padding);
        background: var(--solid-hint-background);
        color: var(--solid-hint-text-color);
      }
      /* inputs (component/form-elements) */
      .solid-input  {
        width: var(--solid-input-width);
        box-sizing: border-box;
        border-radius: var(--solid-input-border-radius);
        border: var(--solid-input-border);
        padding: var(--solid-input-padding);
        box-shadow: var(--solid-input-box-shadow);
      }
      /* main (component/main-form) */
      section.solid-form {
        margin: 10px;
      }
      div.solid-form,
      form.solid-form {
        display: flex;
        flex-direction: vertical;
        gap: 10px;
      }
      .solid-main-form-buttons {
        display: grid;
        gap: var(--solid-main-form-buttons-gap);
        justify-content: left;
        align-content: center;
      }
      .solid-button {
        background-color: var(--ds-grey-90);
        padding: 10px;
      }
      .solid-button:focus,
      .solid-button:hover {
        background-color: var(--ds-grey-80);
      }
      .solid-button h1 {
        margin: 0;
        padding: 0;  
      }
      
      /* checkbox (component/sharing) */
      :root {
        --solid-checkbox-size: 1.4em;
        --solid-checkbox-border-size: 2px;
        --solid-checkbox-border-color: var(--simplycode-highlight-dark);
      }

      @font-face {
        font-family: 'Cocon';

    <!-- /Head HTML -->
    <script>
      var simplyDataApi = {};
      var simplyApp = {};
      window.addEventListener("simply-content-loaded", function() {
        simply.bind = false;
        /* Raw API */
        var simplyRawApi = {
          // baseComponent/raw-api
          "delete" : function(endpoint, params={}) {
            return fetch(simplyRawApi.url + endpoint + "/" + simplyRawApi.encodeGetParams(params), {
              mode : 'cors',
              headers: this.headers,
              redirect: "manual",
              method: "DELETE"
            });
          },
          // baseComponent/raw-api
          "encodeBodyParams" : function(params) {
            return new URLSearchParams(params);
          },
          // baseComponent/raw-api
          "encodeGetParams" : function(params) {
            if (!params) {
              return "";
            }
            return "?" + new URLSearchParams(params);
          },
          // baseComponent/raw-api
          "get" : function(endpoint, params={}) {
            return fetch(simplyRawApi.url + endpoint + "/" + simplyRawApi.encodeGetParams(params), {
              mode : 'cors',
              headers: this.headers
            });
          },
          // baseComponent/raw-api
          "headers" : {
          	'Accept': 'application/json',
          	'Content-Type': 'application/x-www-form-urlencoded'
          },
          // baseComponent/raw-api
          "post" : function(endpoint, params={}) {
            return fetch(simplyRawApi.url + endpoint + "/", {
          //    mode : 'cors',
              headers: this.headers,
              method: "POST",
              redirect: "manual",
              body: simplyRawApi.encodeBodyParams(params)
            });
          },
          // baseComponent/raw-api
          "postRaw" : function(endpoint, params={}, body) {
            return fetch(simplyRawApi.url + endpoint + "/", {
              mode : 'cors',
              headers: this.headers,
              method: "POST",
              redirect: "manual",
              body: body
            });
          },
          // baseComponent/raw-api
          "put" : function(endpoint, params={}) {
            return fetch(simplyRawApi.url + endpoint + "/", {
              mode: 'cors',
              headers: this.headers,
              method: "PUT",
              redirect: "manual",
              body: simplyRawApi.encodeBodyParams(params)
            });
          },
          // baseComponent/raw-api
          "putRaw" : function(endpoint, params={}, body) {
            return fetch(simplyRawApi.url + endpoint + "/", {
              mode: 'cors',
              headers: this.headers,
              method: "PUT",
              redirect: "manual",
              body: body
            });
          },
          // baseComponent/raw-api
          "url" : "/"
        };
        /* End of Raw API */
        /* Data API */
        simplyDataApi = {
          // component/delete-account
          "confirmDeleteAccount" : function(deleteAccountParams) {
            return simplyRawApi.post("api/accounts/delete/confirm", deleteAccountParams)
            .then(function(response) {
              if (response.ok) { // 200 range, OK
                return response.json();
              } else {
                throw new Error("Error result received from confirmDeleteAccount");
              }
            });
          },
          // component/delete-account
          "deleteAccount" : function(deleteAccountParams) {
            return simplyRawApi.post("api/accounts/delete", deleteAccountParams)
            .then(function(response) {
              if (response.ok) { // 200 range, OK
                return response.json();
              } else {
                throw new Error("Error result received from deleteAccount");
              }
            });
          },
          // component/register
          "register" : function(registerParams) {
            return simplyRawApi.post("api/accounts/new", registerParams)
            .then(function(response) {
              if (response.ok) { // 200 range, OK
                return response.json();
              } else {
                throw new Error("Error result received from registration");
              }
            });
          },
          // component/register
          "verifyEmail" : function(verifyParams) {
            return simplyRawApi.post("api/accounts/verify", verifyParams)
            .then(function(response) {
              if (response.ok) { // 200 range, OK
                return response.json();
              } else {
                throw new Error("Error result received from verifyEmail");
              }
            });
          },
          // component/reset-password
          "changePassword" : function(changeParams) {
            return simplyRawApi.post("api/accounts/change-password", changeParams)
            .then(function(response) {
              if (response.ok) { // 200 range, OK
                return response.json();
              } else {
                throw new Error("Error result received from changeParams");
              }
            });
          },
          // component/reset-password
          "sendPasswordReset" : function(resetParams) {
            return simplyRawApi.post("api/accounts/reset-password", resetParams)
            .then(function(response) {
              if (response.ok) { // 200 range, OK
                return response.json();
              } else {
                throw new Error("Error result received from sendPasswordReset");
              }
            });
          }
        };
        /* End of Data API */
        simplyApp = simply.app({
          /* Actions */
          actions: {
            // component/delete-account
            "confirmDeleteAccount" : async function() {
              let deleteAccountParams = {
                "token" : editor.pageData.deleteAccountToken,
              }
              let result = await simplyDataApi.confirmDeleteAccount(deleteAccountParams);
              return result;
            },
            // component/delete-account
            "deleteAccount" : async function() {
              let deleteAccountParams = {
                "email" : editor.pageData.deleteAccount.email
              }
              let result = await simplyDataApi.deleteAccount(deleteAccountParams);
              return result;
            },
            // component/password-entropy
            "getPasswordEntropy" : function(password) {
              let base = simplyApp.actions.getPasswordEntropyBase(password);
              let length = simplyApp.actions.getPasswordEntropyLength(password);
              let decimalPlaces = 2;
              return Math.log(Math.pow(base, length)).toFixed(decimalPlaces);
            },
            // component/password-entropy
            "getPasswordEntropyBase" : function(password) {
              /**
                * Get the base amount of characters from the characters used in the password.
                * This is the number of possible characters to pick from in the used character sets
                *   i.e. 26 for only lower case passwords
                */
              let specialCharacters = ' !"#$%&\'()*+,-./:;<=>?@[\]^_{|}~';
              let lowerCharacters = 'abcdefghijklmnopqrstuvwxyz';
              let upperCharacters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
              let digitCharacters = '0123456789';
            
              let hasSpecial = false;
              let hasLower = false;
              let hasUpper = false;
              let hasDigits = false;
            
              let base = 0;
              for (let i=0; i<password.length; i++) {
                if (!hasSpecial && (specialCharacters.indexOf(password[i]) !== -1)) {
                  hasSpecial = true;
                  base += specialCharacters.length;
                }
                if (!hasLower && (lowerCharacters.indexOf(password[i]) !== -1)) {
                  hasLower = true;
                  base += lowerCharacters.length;
                }
                if (!hasUpper && (upperCharacters.indexOf(password[i]) !== -1)) {
                  hasUpper = true;
                  base += upperCharacters.length;
                }
                if (!hasDigits && (digitCharacters.indexOf(password[i]) !== -1)) {
                  hasDigits = true;
                  base += digitCharacters.length;
                }
                if (
                  (specialCharacters.indexOf(password[i]) === -1) &&
                  (lowerCharacters.indexOf(password[i]) === -1) &&
                  (upperCharacters.indexOf(password[i]) === -1) &&
                  (digitCharacters.indexOf(password[i]) === -1)
                ) {
                  base++;
                }
              }
              return base;
            },
            // component/password-entropy
            "getPasswordEntropyLength" : function (password) {
              /**
                * Check the length of the password based on known rules
                *  Characters will only be counted a maximum of 2 times e.g. aaa has length 2
                */
              let maxOccurances = 2;
              let usedCharacters = {};
              let length = 0;
            
              for (let i=0; i<password.length; i++) {
                if (typeof (usedCharacters[password[i]]) === 'undefined') {
                  length++;
                  usedCharacters[password[i]] = 1;
                } else if (usedCharacters[password[i]] < maxOccurances) {
                  length++;
                  usedCharacters[password[i]]++;
                }
              }
              return length;
            },
            // component/password-entropy
            "validatePasswordEntropy" : function(password) {
              let minimumEntropy = 30;
              return simplyApp.actions.getPasswordEntropy(password) > minimumEntropy;
            },
            // component/register
            "register" : async function() {
              let registerParams = editor.pageData.register;
              registerParams['repeat_password'] = registerParams['password'];
              let result = await simplyDataApi.register(registerParams);
              return result;
            },
            // component/register
            "verifyEmail" : async function() {
              let verifyParams = {
                "email" : editor.pageData.register.email
              }
              let result = await simplyDataApi.verifyEmail(verifyParams);
              return result;
            },
            // component/reset-password
            "changePassword" : async function() {
              let changeParams = {
                "token" : editor.pageData.resetToken,
                "newPassword" : editor.pageData.reset.password
              }
              let result = await simplyDataApi.changePassword(changeParams);
              return result;
            },
            // component/reset-password
            "sendPasswordReset" : async function() {
              let resetParams = {
                "email" : editor.pageData.reset.email
              }
              let result = await simplyDataApi.sendPasswordReset(resetParams);
              return result;
            }
          },
          /* /Actions */
          /* Commands */
          commands: {
            // component/simply-toolbar
            "home" : function(el) {
              document.location.hash="";
            },
            // component/delete-account
            "confirmDeleteAccount" : function(el) {
              simplyApp.actions.confirmDeleteAccount()
              .then(function() {
                document.location.hash = "delete-account-done";
              })
            },
            // component/delete-account
            "deleteAccount" : function(el) {
              simplyApp.actions.deleteAccount()
              .then(function() {
                document.location.hash = "delete-account-sent";
              })
            },
            // component/form-elements
            "autofocus" : function() {
              let autofocus = document.querySelector("[autofocus]");
              if (autofocus) {
                autofocus.focus();
              }
            },
            // component/header-toolbar
            "login" : function(params) {
                document.location.hash="login";
            },
            // component/header-toolbar
            "register" : function(params) {
                document.location.hash="register";
            },
            // component/login
            "loginDone" : function(el) {
              el.setAttribute("action", "/login/password");
              el.setAttribute("method", "POST");
              el.submit();
            //  document.location.hash = "login-done";
            },
            // component/login
            "loginPassword" : function(el) {
              document.location.hash = "login-password";
              simplyApp.commands.autofocus();
            },
            // component/register
            "registerCompleted" : function(el) {
              document.location.href="/login/";
              simplyApp.commands.autofocus();
            },
            // component/register
            "registerDone" : function(el) {
              simplyApp.actions.register()
              .then(function(result) {
                editor.pageData.createdWebId = result.webId;
                document.location.hash="#register-thanks";
              });
            },
            // component/register
            "registerNext" : function(el) {
              document.location.hash="#register-password";
              simplyApp.commands.autofocus();
            },
            // component/register
            "registerVerify" : function(el) {
              let entropyValid = simplyApp.actions.validatePasswordEntropy(editor.pageData.register.password);
              if (!entropyValid) {
                return;
              }
              simplyApp.actions.verifyEmail()
              .then(function() {
                document.location.hash="#register-verify";
                simplyApp.commands.autofocus();
              })
            },
            // component/reset-password
            "changePassword" : function(el) {
              let entropyValid = simplyApp.actions.validatePasswordEntropy(editor.pageData.reset.password);
              if (!entropyValid) {
                return;
              }
              simplyApp.actions.changePassword()
              .then(function() {
                document.location.hash = "reset-password-changed";
              })
            },
            // component/reset-password
            "resetPassword" : function(el) {
              simplyApp.actions.sendPasswordReset()
              .then(function() {
                document.location.hash = "reset-password-sent";
              })
            },
            // component/sharing
            "cancel" : function(el) {
              document.location.href="#";
            },
            // component/sharing
            "sharing" : function(el) {
              el.setAttribute("action", "/api/sharing");
              el.setAttribute("method", "POST");
              el.submit();
            },
            // page/home
            "navigateDeleteAccount" : function(el) {
              document.location.pathname = "/account/delete/";
            },
            // page/home
            "navigateLogin" : function(el) {
              document.location.pathname = "/login/";
            },
            // page/home
            "navigateRegister" : function(el) {
              document.location.pathname = "/register/";
            },
            // page/home
            "navigateResetPassword" : function(el) {
              document.location.pathname = "/reset-password/";
            }
          },
          /* /Commands */
          /* Routes */
          routes: {
            // page/delete-account
            "/account/delete/confirm/#delete-account-done" : function(params) {
              editor.pageData.page = "delete-account-done";
            },
            // page/delete-account
            "/account/delete/confirm/" : function(params) {
              editor.pageData.deleteAccountToken = new URL(document.location.href).searchParams.get('token');
              editor.pageData.page = "delete-account-confirm";
            },
            // page/delete-account
            "/account/delete/#delete-account-sent" : function(params) {
              editor.pageData.page = "delete-account-sent";
            },
            // page/delete-account
            "/account/delete/" : function(params) {
              editor.pageData.page = "delete-account";
            },
            // page/login
            "/login/#login-done" : function(params) {
              editor.pageData.page = "login-done";
            },
            // page/login
            "/login/#login-password" : function(params) {
              editor.pageData.page = "login-password";
            },
            // page/register
            "/register/#register-password" : function(params) {
              editor.pageData.page = "register-password";
            },
            // page/register
            "/register/#register-thanks" : function(params) {
              editor.pageData.page = "register-thanks";
            },
            // page/register
            "/register/#register-verify" : function(params) {
              editor.pageData.page = "register-verify";
            },
            // page/reset-password
            "/change-password/#reset-password-changed" : function(params) {
              editor.pageData.page = "reset-password-changed";
            },
            // page/reset-password
            "/reset-password/#reset-password-sent" : function(params) {
              editor.pageData.page = "reset-password-sent";
            },
            // page/login
            "/login/" : function(params) {
              editor.pageData.loginParams = {};
              let loginParams = ['response_type', 'display', 'scope', 'client_id', 'redirect_uri', 'state', 'nonce', 'request'];
              loginParams.forEach(function(param) {
                editor.pageData.loginParams[param] = new URL(document.location.href).searchParams.get(param);
              });
              editor.pageData.page = "login";
            },
            // page/logout
            "/goodbye" : function(params) {
              editor.pageData.page = "logout";
            },
            // page/logout
            "/logout" : function(params) {
              editor.pageData.page = "logout";
            },
            // page/register
            "/register/" : function(params) {
              editor.pageData.page = "register";
            },
            // page/reset-password
            "/change-password/" : function(params) {
              editor.pageData.resetToken = new URL(document.location.href).searchParams.get('token');
              editor.pageData.page = "change-password";
            },
            // page/reset-password
            "/reset-password/" : function(params) {
              editor.pageData.page = "reset-password";
            },
            // page/sharing
            "/sharing" : function(params) {
              editor.pageData.sharingParams = {};
              let sharingParams = ['response_type', 'display', 'scope', 'client_id', 'redirect_uri', 'state', 'nonce', 'request', 'returnUrl'];
              sharingParams.forEach(function(param) {
                editor.pageData.sharingParams[param] = new URL(document.location.href).searchParams.get(param);
              });
              editor.pageData.appOrigin = new URL(document.location.href).searchParams.get("redirect_uri");
              editor.pageData.page = "sharing";
            },
            // page/home
            "/" : function(params) {
              editor.pageData.page = "home";
            }
          }
          /* /Routes */
        });
      });
      function clone(ob) {
        return JSON.parse(JSON.stringify(ob));
      }
      function updateDataSource(name) {
        document.querySelectorAll('[data-simply-data="'+name+'"]').forEach(function(list) {
          editor.list.applyDataSource(list, name);
          list.dataBindingPaused = 0;
        });
      }
    </script>
  </head>

    <script>
      /* Transformers */
      editor.transformers = {
        // component/password-entropy
        "validateEntropy" : {
          render : function(data) {
            if (!this.entropyChecker) {
              this.entropyChecker = this.addEventListener("input", function() {
                let entropyValid = simplyApp.actions.validatePasswordEntropy(this.value);
                if (!entropyValid) {
                  this.setCustomValidity("Please use a stronger password. Make it longer or add more special characters.");
                } else {
                  this.setCustomValidity("");
                }
              });
            }
            return data;
          },
          extract : function(data) {
            return data;
          }
        },
        // component/sharing
        "appOrigin" : {
          render : function(data) {
            this.originalData = data;
            if (data.match(/dpgmedia\.nl/)) {
              return "DPG Media";
            }
            return data;
          },
          extract : function(data) {
            return this.originalData;
          }
        }
      };
      /* /Transformers */
    </script>
